---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kong-admin-route
  namespace: kong
  annotations:
    konghq.com/strip-path: "true"
spec:
  parentRefs:
  - name: kong-gw-01
    namespace: kong
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /admin
    # Optional: You can match by hostname to keep it secure
    # hostnames:
    # - "admin.yourdomain.com"
    backendRefs:
    - name: kong-gw-01-kong-admin
      port: 8001
      # Note: Port 8444 for TLS is also available if tls.enabled is true

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kong-manager-route
  namespace: kong
spec:
  parentRefs:
  - name: kong-gw-01
    namespace: kong
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /manager
    - path:
        type: PathPrefix
        value: /assets
    backendRefs:
    - name: kong-gw-01-kong-manager
      port: 8002
