---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-deployment
  labels:
    app: qbittorrent
  namespace: mediaserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      # nodeSelector:
      #   kubernetes.io/hostname: malinka3
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ['sh', '-c', 'mkdir -p /config/qBittorrent && cp -f /tmp/config/qbittorrent.conf /config/qBittorrent/qBittorrent.conf || true && chown -R 911:1000 /config']
          volumeMounts:
            - name: qbittorrent-data
              mountPath: /config
            - name: qbittorrent-config
              mountPath: /tmp/config
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          volumeMounts:
            - mountPath: /downloads
              name: downloads
            - mountPath: /config
              name: qbittorrent-data
      volumes:
        - name: downloads
          persistentVolumeClaim:
            claimName: mediaserver-shared-pvc
        - name: qbittorrent-config
          configMap:
            name: qbittorrent-config
        - name: qbittorrent-data
          persistentVolumeClaim:
            claimName: qbittorrent-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-data-pvc
  namespace: mediaserver
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ceph-filesystem
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-config
  namespace: mediaserver
data:
  qbittorrent.conf: |
    [Application]
    FileLogger\Age=1
    FileLogger\AgeType=1
    FileLogger\Backup=true
    FileLogger\DeleteOld=true
    FileLogger\Enabled=true
    FileLogger\MaxSizeBytes=66560
    FileLogger\Path=/config/qBittorrent/logs1

    [AutoRun]
    enabled=false
    program=

    [BitTorrent]
    Session\AddTorrentStopped=false
    Session\DefaultSavePath=/downloads/
    Session\ExcludedFileNames=
    Session\PerformanceWarning=true
    Session\QueueingSystemEnabled=true
    Session\ShareLimitAction=Stop
    Session\TempPath=/downloads/incomplete/
    Session\Port=51413
    Session\SSL\Port=51414
    Session\RequestQueueSize=5000

    [Core]
    AutoDeleteAddedTorrentFile=Never

    [LegalNotice]
    Accepted=true

    [Meta]
    MigrationVersion=8

    [Network]
    PortForwardingEnabled=false
    Proxy\HostnameLookupEnabled=false
    Proxy\Profiles\BitTorrent=true
    Proxy\Profiles\Misc=true
    Proxy\Profiles\RSS=true

    [Preferences]
    Connection\PortRangeMin=51413
    Connection\UPnP=false
    Downloads\SavePath=/downloads/
    Downloads\TempPath=/downloads/incomplete/
    General\Locale=en
    MailNotification\req_auth=true
    WebUI\Address=*
    WebUI\AuthSubnetWhitelist=192.168.0.0/16, 10.0.0.0/8
    WebUI\AuthSubnetWhitelistEnabled=true
    WebUI\CSRFProtection=false
    WebUI\ClickjackingProtection=false
    WebUI\HostHeaderValidation=false
    WebUI\Port=30001
    WebUI\RootFolder=/qb
    WebUI\ReverseProxySupportEnabled=true
    WebUI\TrustedReverseProxiesList=10.0.0.0/8
    WebUI\ServerDomains=*
    General\DeleteTorrentsFilesAsDefault=true
    General\StatusbarExternalIPDisplayed=true

    [RSS]
    AutoDownloader\DownloadRepacks=true
    AutoDownloader\SmartEpisodeFilter=s(\\d+)e(\\d+), (\\d+)x(\\d+), "(\\d{4}[.\\-]\\d{1,2}[.\\-]\\d{1,2})", "(\\d{1,2}[.\\-]\\d{1,2}[.\\-]\\d{4})"

