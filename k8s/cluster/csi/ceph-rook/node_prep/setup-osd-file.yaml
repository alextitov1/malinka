---
# Ansible playbook to create OSD backing files and configure loop devices
# on all Kubernetes nodes for Rook-Ceph.
#
# Usage:
#   ansible-playbook k8s/cluster/csi/ceph-rook/setup-osd-file.yaml
#
- name: Set up file-backed OSD for Rook-Ceph
  hosts: kube_node
  become: true
  vars:
    osd_size_gb: 150
    osd_dir: /var/lib/rook-OSDs
    osd_file: /var/lib/rook-OSDs/osd-{{ osd_size_gb }}gb.img
    osd_loop_device: /dev/loop10

  tasks:
    - name: Create OSD directory
      ansible.builtin.file:
        path: "{{ osd_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create OSD backing file ({{ osd_size_gb }})
      ansible.builtin.command:
        cmd: "fallocate -l {{ osd_size_gb }}G {{ osd_file }}"
        creates: "{{ osd_file }}"

    - name: Set permissions on OSD file
      ansible.builtin.file:
        path: "{{ osd_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Check if loop device is already attached
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          losetup -j {{ osd_file }} -O NAME --noheadings | head -1
        executable: /bin/bash
      register: existing_loop
      changed_when: false

    - name: Attach loop device
      ansible.builtin.command:
        cmd: "losetup {{ osd_loop_device }} {{ osd_file }}"
      register: loop_device
      changed_when: loop_device.stdout | length > 0
      when: existing_loop.stdout | length == 0

    - name: Display loop device
      ansible.builtin.debug:
        msg: "OSD loop device: {{ existing_loop.stdout if existing_loop.stdout | length > 0 else loop_device.stdout }}"

    - name: Install systemd service for loop device persistence
      ansible.builtin.template:
        src: rook-osd-loopdev.service.j2
        dest: /etc/systemd/system/rook-osd-loopdev.service
        owner: root
        group: root
        mode: "0644"
      notify: Reload systemd

    - name: Reload systemd before managing loop device service
      ansible.builtin.meta: flush_handlers

    - name: Enable loop device service
      ansible.builtin.systemd:
        name: rook-osd-loopdev.service
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
