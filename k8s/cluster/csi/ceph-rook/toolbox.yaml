# Rook-Ceph Toolbox – for debugging and running ceph CLI commands
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rook-ceph-tools
  namespace: rook-ceph
  labels:
    app: rook-ceph-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-tools
  template:
    metadata:
      labels:
        app: rook-ceph-tools
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: rook-ceph-default
      containers:
        - name: rook-ceph-tools
          image: quay.io/ceph/ceph:v20.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              CEPH_CONFIG="/etc/ceph/ceph.conf"
              MON_CONFIG="/etc/rook/mon-endpoints"
              KEYRING_FILE="/etc/ceph/keyring"
              ADMIN_SECRET_FILE="/var/lib/rook-ceph-mon/secret.keyring"
              CONFIG_OVERRIDE="/etc/rook-config-override/config"

              write_endpoints() {
                endpoints=$(cat "${MON_CONFIG}")
                mon_endpoints=$(echo "${endpoints}" | sed 's/[a-z0-9_-]\+=//g')

                cat <<EOF > "${CEPH_CONFIG}"
              [global]
              mon_host = ${mon_endpoints}

              [client.admin]
              keyring = ${KEYRING_FILE}
              EOF

                if [[ -f "${CONFIG_OVERRIDE}" && -s "${CONFIG_OVERRIDE}" ]]; then
                  printf '\n' >> "${CEPH_CONFIG}"
                  cat "${CONFIG_OVERRIDE}" >> "${CEPH_CONFIG}"
                  printf '\n' >> "${CEPH_CONFIG}"
                fi
              }

              watch_endpoints() {
                real_path=$(realpath "${MON_CONFIG}")
                initial_time=$(stat -c %Z "${real_path}")
                while true; do
                  real_path=$(realpath "${MON_CONFIG}")
                  latest_time=$(stat -c %Z "${real_path}")
                  if [[ "${latest_time}" != "${initial_time}" ]]; then
                    write_endpoints
                    initial_time=${latest_time}
                  fi
                  sleep 10
                done
              }

              ceph_secret="${ROOK_CEPH_SECRET:-}"
              if [[ -z "${ceph_secret}" ]]; then
                ceph_secret=$(cat "${ADMIN_SECRET_FILE}")
              fi

              cat <<EOF > "${KEYRING_FILE}"
              [${ROOK_CEPH_USERNAME}]
              key = ${ceph_secret}
              EOF

              chmod 600 "${KEYRING_FILE}"
              write_endpoints
              watch_endpoints
          tty: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 2016
            runAsGroup: 2016
            capabilities:
              drop:
                - ALL
          env:
            - name: ROOK_CEPH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-mon
                  key: ceph-username
            - name: ROOK_CEPH_SECRET
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-mon
                  key: ceph-secret
          volumeMounts:
            - mountPath: /etc/ceph
              name: ceph-config
            - mountPath: /etc/rook
              name: mon-endpoint-volume
            - mountPath: /var/lib/rook-ceph-mon
              name: ceph-admin-secret
              readOnly: true
            - mountPath: /etc/rook-config-override
              name: rook-config-override
              readOnly: true
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: ceph-admin-secret
          secret:
            secretName: rook-ceph-mon
            optional: false
            items:
              - key: ceph-secret
                path: secret.keyring
        - name: mon-endpoint-volume
          configMap:
            name: rook-ceph-mon-endpoints
            items:
              - key: data
                path: mon-endpoints
        - name: rook-config-override
          configMap:
            name: rook-config-override
            optional: true
        - name: ceph-config
          emptyDir: {}
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 5
        - effect: NoSchedule
          operator: Exists
