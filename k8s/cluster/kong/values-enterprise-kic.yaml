# values-enterprise-kic-controller.yaml
# Split topology: controller-only release (no proxy container).

# Number of KIC controller pods.
replicaCount: 1

deployment:
  kong:
    enabled: false

# Kong Ingress Controller configuration
ingressController:
  enabled: true
  installCRDs: false
  image:
    repository: kong/kubernetes-ingress-controller
    tag: "3.5.6"
  gatewayDiscovery:
    enabled: true
    # We target the admin service from the Gateway release (release name: kong).
    generateAdminApiService: false
    adminApiService:
      namespace: kong
      name: kong-gw-01-kong-admin

  env:
    # Keep explicit so GatewayClass controllerName is unambiguous.
    gateway_api_controller_name: konghq.com/kic-gateway-controller-01
    # Publish addresses from the Gateway release proxy service.
    publish_service: kong/kong-gw-01-kong-proxy
    # Gateway admin TLS is self-signed by default in chart installs.
    kong_admin_tls_skip_verify: true
