[defaults]
inventory = ./inventory/
remote_user = ansible
ask_pass = false
collections_path = ./collections
roles_path = ./roles
# deprecation_warnings=False
host_key_checking = false
# Performance: Use parallel execution
forks = 50
# Performance: Don't gather facts unless strictly needed (Kubespray usually dictates this)
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 86400

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_password = false

[ssh_connection]
# Performance: Use pipelining to avoid transferring scripts as separate files
pipelining = True
# Performance: Keep SSH connection open to avoid reconnect overhead
ssh_args = -o ControlMaster=auto -o ControlPersist=60m -o ConnectionAttempts=100 -o UserKnownHostsFile=/dev/null
# Set retries
retries = 3
