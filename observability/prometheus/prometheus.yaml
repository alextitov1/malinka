global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  # Control plane metrics
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
  # Node metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          env: "lab"
          role: "host"
  # Container metrics
  - job_name: "containers"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          env: "lab"
          role: "container"
  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://grafana:3000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: instance
        replacement: grafana
      - target_label: __address__
        replacement: blackbox-exporter:9115
