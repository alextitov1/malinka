apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-route
  namespace: mediaserver
  annotations:
    konghq.com/strip-path: "true"
spec:
  parentRefs:
    - name: kong-gw-01
      namespace: kong
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /qb
      backendRefs:
        - name: qbittorrent-service
          port: 30001
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-service
  namespace: mediaserver
spec:
  selector:
    app: qbittorrent
  ports:
    - protocol: TCP
      port: 30001
      targetPort: 8080
  type: ClusterIP
