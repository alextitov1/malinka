---
apiVersion: v1
kind: Service
metadata:
  name: smb
  namespace: mediaserver
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.88.241
  selector:
    app: smb-server
  ports:
    # - name: netbios-ssn
    #   port: 139
    #   targetPort: 139
    #   protocol: TCP
    - name: smb
      port: 445
      targetPort: 445
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smb-server
  namespace: mediaserver
  labels:
    app: smb-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smb-server
  template:
    metadata:
      labels:
        app: smb-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: malinka3
      containers:
        - name: samba
          image: docker.io/dperson/samba:latest
          imagePullPolicy: IfNotPresent
          ports:
            # - name: netbios-ssn
            #   containerPort: 139
            #   protocol: TCP
            - name: smb
              containerPort: 445
              protocol: TCP
          env:
            - name: USER1
              value: alex;change-me
            - name: SHARE1
              value: mediaserver;/mediaserver;yes;yes;yes
            - name: SHARE2
              value: admin;/mediaserver;yes;no;no;alex
          volumeMounts:
            - name: mediaserver-shared
              mountPath: /mediaserver
      volumes:
        - name: mediaserver-shared
          persistentVolumeClaim:
            claimName: mediaserver-shared-pv